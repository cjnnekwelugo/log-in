<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Welcome Back</title>
    <link rel="stylesheet" href="css/output.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class=" min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md">
        <!-- Login Card -->
        <div class="bg-white rounded-2xl shadow-2xl p-8">
            <!-- Header -->
            <div class="text-center mb-8">
                <h1 class="text-4xl font-bold text-gray-800 mb-2">Welcome Back</h1>
                <p class="text-gray-600">Sign in to your account to continue</p>
            </div>

            <!-- Login Form -->
            <form class="space-y-5">
                <!-- Email Input -->
                <div>
                    <label for="email" class="block text-sm font-medium text-gray-700 mb-2">
                        Email Address
                    </label>
                    <input 
                        type="email" 
                        id="email" 
                        placeholder="you@example.com"
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
                        required
                    >
                </div>

                <!-- Password Input -->
                <div>
                    <div class="flex justify-between items-center mb-2">
                        <label for="password" class="block text-sm font-medium text-gray-700">
                            Password
                        </label>
                        <a href="#" class="text-sm text-blue-600 hover:text-blue-700 font-medium">
                            Forgot Password?
                        </a>
                    </div>
                    <input 
                        type="password" 
                        id="password" 
                        placeholder="Enter your password"
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
                        required
                    >
                </div>

                <!-- Remember Me -->
                <div class="flex items-center">
                    <input 
                        type="checkbox" 
                        id="remember" 
                        class="w-4 h-4 text-blue-600 border-gray-300 rounded focus:ring-2 focus:ring-blue-500 cursor-pointer"
                    >
                    <label for="remember" class="ml-2 text-sm text-gray-600 cursor-pointer">
                        Remember me
                    </label>
                </div>

                <!-- Login Button -->
                <button 
                    type="submit"
                    class="w-full  from-blue-600 to-indigo-600 text-white font-semibold py-3 rounded-lg hover:from-blue-700 hover:to-indigo-700 transition duration-300 shadow-lg hover:shadow-xl"
                >
               <button class="bg-blue-700 text-white py-5 px-20 rounded ">
                   sign in
               </button>
            </form>

                       <!-- Divider -->
            <div class="my-6 relative">
                <div class="absolute inset-0 flex items-center">
                    <div class="w-full border-t border-gray-300"></div>
                </div>
               
            </div>

            <!-- Social Login Options -->
            <div class="space-y-3">
                <!-- Facebook Login -->
                <button 
                    type="button"
                    class="w-full flex items-center justify-center gap-3 px-4 py-3 border border-gray-300 rounded-lg hover:bg-gray-50 transition duration-300 font-medium text-gray-700"
                >
                    <i class="fab fa-facebook-f text-blue-600 text-lg"></i>
                    Login with Facebook
                </button>

                <!-- Google Login -->
                <button 
                    type="button"
                    class="w-full flex items-center justify-center gap-3 px-4 py-3 border border-gray-300 rounded-lg hover:bg-gray-50 transition duration-300 font-medium text-gray-700"
                >
                    <i class="fab fa-google text-red-500 text-lg"></i>
                    Login with Google
                </button>
            </div>

            <!-- Footer Sign Up Link -->
            <div class="mt-8 text-center border-t border-gray-200 pt-6">
                <p class="text-gray-600 text-sm">
                    Don't have an account? 
                    <a href="#" class="text-blue-600 hover:text-blue-700 font-semibold transition">
                        Sign Up Now
                    </a>
                </p>
            </div>
        </div>

       <!--2nd Footer-->
        <div class="text-center mt-6 text-gray-600 text-xs">
            <p>&copy; 2026 <a href="emailto:cjnnekwelugo@gmail.com" class="text-blue-600 hover:text-blue-700">Cj Nnekwelugo</a>. All rights reserved.</p>
        </div>
    </div>
</body>
</html>
